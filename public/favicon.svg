<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3fd6" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#4a2c8a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1a0d3a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9b5ef5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9b5ef5" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- background -->
  <rect width="32" height="32" fill="#000"/>
  <!-- outer glow halo -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)" filter="url(#blur)"/>
  <!-- orb core -->
  <circle cx="16" cy="16" r="8" fill="url(#orb)"/>
  <!-- inner highlight -->
  <circle cx="14" cy="13" r="2.5" fill="#c084fc" opacity="0.25"/>
</svg>
